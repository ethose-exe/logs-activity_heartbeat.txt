name: daily_activity_hack

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Explicitly granting write access
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # Updated to v4 to fix the warning

      - name: Update Heartbeat
        run: |
          mkdir -p logs
          echo "Last heartbeat: $(date)" > logs/activity_heartbeat.txt

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add logs/activity_heartbeat.txt
          git commit -m "sys.log: automated_heartbeat_check" || exit 0
          git push
